# SmoothNAS plugin manifest for the GitHub Actions self-hosted runner.
#
# The release workflow rewrites artifact.digest at publish time so the
# manifest distributed via GitHub releases pins to a real uploaded
# image. The bare-tag form here is suitable for development sideloads
# against an unreleased build.
#
# The plugin runs one controller container. That controller uses the
# SmoothNAS runtime socket to start one-shot ephemeral runner worker
# containers. Workers use their ephemeral container rootfs for active
# GitHub workspaces by default; the tier-bound workspace volume remains
# available for the controller and can be opt-in bound to workers.

apiVersion: smoothnas.io/v1
kind: Plugin

metadata:
  name: gh-runner
  version: 0.3.6 # x-release-please-version
  description: |
    GitHub Actions ephemeral self-hosted runner controller. The
    controller keeps a small pool of one-shot worker containers; each
    worker registers with GitHub, runs one job, deregisters, and is
    removed with its ephemeral workspace. Outbound network only: no
    ports exposed, no SmoothNAS UI to embed — GitHub.com is the UI.
  vendor: smoothnas
  homepage: https://github.com/RakuenSoftware/smoothnas-plugin-gh-runner

artifact:
  type: oci-image
  image: ghcr.io/rakuensoftware/smoothnas-plugin-gh-runner:0.3.6 # x-release-please-version
  # digest filled in by .github/workflows/release.yml at publish time.

container:
  command: []
  restartPolicy: unless-stopped

instances:
  count: 1
  configurable: false

volumes:
  - name: workspace
    mode: tier-bound
    slot: SSD
    minSize: 100G
    bind: /home/runner/_work
    perInstance: false

# No `ports`: runner is outbound-only.
# No `ui`: GitHub.com is the UI; the install wizard skips the embed
# config when ui is omitted.

profiles:
  - default-limits
  - runtime-control

config:
  - key: GH_REPO_URL
    type: string
    description: |
      Repository or organisation URL the runner registers against.
      Examples:
        https://github.com/owner/repo
        https://github.com/my-org
  - key: GH_RUNNER_TOKEN
    type: string
    secret: true
    description: |
      Personal access token, GitHub App installation token, or GitHub
      OAuth token used to mint fresh registration tokens for ephemeral
      workers. Registration tokens from the GitHub UI are not supported
      for controller mode because each worker needs a new one-shot token.
  - key: GH_RUNNER_LABELS
    type: string
    default: "self-hosted,linux,x64,smoothnas"
    description: Comma-separated runner labels.
  - key: GH_RUNNER_GROUP
    type: string
    default: "default"
    description: Runner group name (org-level runners only; ignored at repo scope).
  - key: GH_RUNNER_WORKERS
    type: string
    default: "2"
    description: Number of ephemeral worker containers to keep available.
  - key: GH_RUNNER_BIND_WORKSPACE
    type: string
    default: "false"
    description: |
      Set to true to bind the tier-bound workspace volume into each
      worker. The default false keeps active GitHub checkouts inside
      the worker's ephemeral rootfs and removes them with the worker.
