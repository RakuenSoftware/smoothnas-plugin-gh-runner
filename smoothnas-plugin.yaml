# SmoothNAS plugin manifest for the GitHub Actions self-hosted runner.
#
# The release workflow rewrites artifact.digest at publish time so the
# manifest distributed via GitHub releases pins to a real uploaded
# image. The bare-tag form here is suitable for development sideloads
# against an unreleased build.
#
# Multiple instances: this is the first reference plugin where
# count > 1 matters. The volumes[].perInstance flag makes each runner
# get its own workspace under
# /mnt/<tier>/.plugins/gh-runner/instance-<n>/workspace/.

apiVersion: smoothnas.io/v1
kind: Plugin

metadata:
  name: gh-runner
  version: 0.2.2 # x-release-please-version
  description: |
    GitHub Actions self-hosted runner. Each instance registers itself
    with the configured repo or org on container start and deregisters
    cleanly on stop (SIGTERM trap calls config.sh remove). Outbound
    network only: no ports exposed, no SmoothNAS UI to embed —
    GitHub.com is the UI.
  vendor: smoothnas
  homepage: https://github.com/RakuenSoftware/smoothnas-plugin-gh-runner

artifact:
  type: oci-image
  image: ghcr.io/rakuensoftware/smoothnas-plugin-gh-runner:0.2.2 # x-release-please-version
  # digest filled in by .github/workflows/release.yml at publish time.

container:
  command: []
  restartPolicy: unless-stopped

instances:
  count: 2
  configurable: true

volumes:
  - name: workspace
    mode: tier-bound
    slot: SSD
    minSize: 100G
    bind: /home/runner/_work
    perInstance: true

# No `ports`: runner is outbound-only.
# No `ui`: GitHub.com is the UI; the install wizard skips the embed
# config when ui is omitted.

profiles:
  - default-limits

config:
  - key: GH_REPO_URL
    type: string
    description: |
      Repository or organisation URL the runner registers against.
      Examples:
        https://github.com/owner/repo
        https://github.com/my-org
  - key: GH_RUNNER_TOKEN
    type: string
    secret: true
    description: |
      Either a personal access token (recommended; token rotates
      registration tokens automatically across restarts) or a
      short-lived registration token from the repo/org runner
      settings page. PATs are detected by the ghp_ / github_pat_
      prefix.
  - key: GH_RUNNER_LABELS
    type: string
    default: "self-hosted,linux,x64,smoothnas"
    description: Comma-separated runner labels.
  - key: GH_RUNNER_GROUP
    type: string
    default: "default"
    description: Runner group name (org-level runners only; ignored at repo scope).
